<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory & Slips</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --accent: #f39c12; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 50px; }
        .nav { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; color: #555; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .content { padding: 15px; max-width: 1000px; margin: auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; width: 100%; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-view { background: #34a853; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div class="nav">
    <div class="tab active" onclick="showTab('inv', this)">📦 Stock</div>
    <div class="tab" onclick="showTab('slipView', this)">📜 View Slips</div>
    <div class="tab" onclick="showTab('hist', this)">🕒 History</div>
</div>

<div class="content">
    <div id="inv" class="section active">
        <div id="invStats" class="stats"></div>
        <div class="card">
            <div class="grid">
                <input type="text" id="rNo" placeholder="Roll No">
                <input type="text" id="sNo" placeholder="Sort No">
                <input type="number" id="mtr" placeholder="Meters">
                <input type="number" id="width" placeholder="Width">
                <input type="number" id="nWt" placeholder="Net Wt">
                <input type="text" id="grade" placeholder="Grade">
            </div>
            <button style="background:var(--primary)" onclick="saveInv()">Add to Stock</button>
        </div>
        <button style="background:var(--accent)" onclick="makeSlip()">Generate New Packing Slip</button>
        <table>
            <thead><tr><th>Sel</th><th>Roll</th><th>Sort</th><th>Grade</th><th>Mtrs</th></tr></thead>
            <tbody id="invBody"></tbody>
        </table>
    </div>

    <div id="slipView" class="section">
        <h3>Generated Packing Slips</h3>
        <table>
            <thead><tr><th>Date</th><th>Client</th><th>Transport</th><th>Action</th></tr></thead>
            <tbody id="slipListBody"></tbody>
        </table>
    </div>

    <div id="hist" class="section">
        <h3>Sold Inventory</h3>
        <table>
            <thead><tr><th>Roll</th><th>Sort</th><th>Grade</th><th>Meters</th></tr></thead>
            <tbody id="histBody"></tbody>
        </table>
    </div>
</div>

<div id="slipTemplate" style="position:absolute; left:-9999px; width:800px; padding:40px; background:white; color: black;">
    <h1 style="text-align:center; text-decoration: underline;">PACKING LIST</h1>
    <div style="font-size: 18px; margin-bottom: 20px;">
        <p><b>Client:</b> <span id="slipClient"></span></p>
        <p><b>Transport:</b> <span id="slipTransport"></span></p>
        <p><b>Date:</b> <span id="slipDate"></span></p>
    </div>
    <table border="1" style="width:100%; border-collapse:collapse; text-align: center;">
        <thead><tr style="background:#f2f2f2;"><th>Roll No</th><th>Sort No</th><th>Grade</th><th>Meters</th><th>Width</th><th>Net Wt</th></tr></thead>
        <tbody id="slipItems"></tbody>
    </table>
    <h2 id="slipTotal" style="text-align:right; margin-top:20px;"></h2>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrf3ICzhe0Jt7czGlCJl1ZjaTHsOhkzkKL67jVg5QS2M-RpTgeptJ1QEc_UsQ8JdPnlw/exec"; 
    let db = { inventory: [], slips: [] };

    function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function loadData() {
        const res = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
        db = await res.json();
        render();
    }

    function render() {
        const ib = document.getElementById('invBody');
        const hb = document.getElementById('histBody');
        const slb = document.getElementById('slipListBody');
        ib.innerHTML = ""; hb.innerHTML = ""; slb.innerHTML = "";

        db.inventory.forEach(i => {
            if (i.status === 'Available') {
                ib.innerHTML += `<tr><td><input type="checkbox" class="cb" data-r="${i.rollNo}"></td><td>${i.rollNo}</td><td>${i.sortNo}</td><td>${i.grade}</td><td>${i.meters}</td></tr>`;
            } else {
                hb.innerHTML += `<tr><td>${i.rollNo}</td><td>${i.sortNo}</td><td>${i.grade}</td><td>${i.meters}</td></tr>`;
            }
        });

        db.slips.reverse().forEach(s => {
            slb.innerHTML += `<tr><td>${s.date}</td><td>${s.client}</td><td>${s.transport}</td><td><button class="btn-view" onclick="rebuildSlip('${s.id}')">View/Download</button></td></tr>`;
        });
    }

    async function makeSlip() {
        const sel = Array.from(document.querySelectorAll('.cb:checked')).map(c => c.dataset.r);
        if (!sel.length) return alert("Select rolls!");
        const cli = prompt("Client Name?");
        const trans = prompt("Transport Name?");
        if (!cli || !trans) return;

        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:"allot", rollNos:sel, client:cli, transport:trans}) });
        
        // Populate Template & Download
        showSlipOnTemplate(cli, trans, new Date().toLocaleDateString(), sel);
        loadData();
    }

    function rebuildSlip(slipId) {
        const s = db.slips.find(x => x.id == slipId);
        const rolls = s.rolls.split(",");
        showSlipOnTemplate(s.client, s.transport, s.date, rolls);
    }

    function showSlipOnTemplate(cli, trans, date, rollNos) {
        // We find all rolls (even if sold) to rebuild the slip
        const items = db.inventory.filter(i => rollNos.includes(i.rollNo.toString()));
        document.getElementById('slipClient').innerText = cli;
        document.getElementById('slipTransport').innerText = trans;
        document.getElementById('slipDate').innerText = date;
        
        let h = ""; let t = 0;
        items.forEach(i => {
            h += `<tr><td>${i.rollNo}</td><td>${i.sortNo}</td><td>${i.grade}</td><td>${i.meters}</td><td>${i.width}</td><td>${i.netWeight}</td></tr>`;
            t += parseFloat(i.meters);
        });
        document.getElementById('slipItems').innerHTML = h;
        document.getElementById('slipTotal').innerText = `Total: ${t.toFixed(2)} Meters`;

        // Generate and Auto-Download
        html2canvas(document.getElementById('slipTemplate'), {scale: 2}).then(c => {
            const a = document.createElement('a'); a.href = c.toDataURL(); a.download = `PackingSlip_${cli}.png`; a.click();
        });
    }

    async function saveInv() {
        const p = { action: "addInventory", rollNo: val('rNo'), sortNo: val('sNo'), meters: val('mtr'), width: val('width'), netWeight: val('nWt'), grade: val('grade') };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(p) });
        loadData();
    }

    const val = (id) => document.getElementById(id).value;
    window.onload = loadData;
</script>
</body>
</html>
